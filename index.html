<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>516 viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#F5F5F3;--card:#FFF;--ink:#141414;
  --muted:#5A5A5A;--faint:#909090;
  --line:#E2E2E2;--line2:#C8C8C8;--r:9px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;line-height:1.6;
  padding:max(16px,env(safe-area-inset-top)) 16px 60px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto}

/* ── 헤더 ── */
.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0 14px;border-bottom:1px solid var(--line);margin-bottom:16px;
}
.top h1{font-family:"Outfit",sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0}
.lock-btn{
  background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;
  color:var(--ink);display:flex;align-items:center;
}
.lock-btn.on{color:var(--faint)}
.lock-btn:hover{color:var(--ink)!important}

/* ── 토큰 패널 ── */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:16px}
.panel label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}
.tok-row{display:flex;gap:8px}
.tok-row input{flex:1}
.err-msg{font-size:12px;color:#B94040;margin-top:8px}

/* ── 공용 ── */
input,select{
  font-family:"Pretendard",sans-serif;font-size:14px;
  padding:9px 11px;border:1px solid var(--line);border-radius:var(--r);
  background:#fff;color:var(--ink);width:100%;outline:none;
}
input:focus,select:focus{border-color:var(--ink)}
select{cursor:pointer}
button{
  font-family:"Pretendard",sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;padding:9px 14px;border-radius:var(--r);
  border:1px solid var(--line);background:#fff;color:var(--ink);white-space:nowrap;
}
button.primary{background:var(--ink);border-color:var(--ink);color:#fff}
button.sm{padding:5px 10px;font-size:12px}
button.danger{border-color:#C44;color:#C44}
button.danger:hover{background:#C44;color:#fff}
button:disabled{opacity:.4;cursor:default}
.text-btn{font-size:12px;color:var(--faint);background:none;border:none;cursor:pointer;padding:0;font-family:inherit}
.text-btn:hover{color:var(--ink)}

/* ── 컬렉션 ── */
.coll-wrap{
  margin-bottom:0;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px;
}
.coll-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.coll-chip{
  font-size:13px;font-family:"Pretendard",sans-serif;font-weight:500;
  padding:6px 13px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;
}
.coll-chip.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.coll-count{opacity:.5;margin-left:4px;font-size:11px}
.progress{height:2px;background:var(--line);border-radius:2px;overflow:hidden;margin:6px 0 3px}
.progress>span{display:block;height:100%;background:var(--ink);width:0;transition:width .2s}
.load-msg{font-size:12px;color:var(--faint);min-height:1.2em}

/* ── 검색 ── */
.search-row{
  display:flex;gap:10px;align-items:center;
  padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:14px;
}
.search-row input{flex:1}
.count-pill{font-size:12px;color:var(--faint);white-space:nowrap;flex-shrink:0}

/* ── 필터 2단 ── */
.filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.cat-chip{
  font-size:12px;font-family:"Pretendard",sans-serif;font-weight:600;
  padding:5px 13px;border-radius:999px;
  border:1px solid var(--line2);background:#fff;color:var(--muted);cursor:pointer;
}
.cat-chip.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.cat-chip.has-active{border-color:var(--ink);color:var(--ink)}
.cat-chip.sel.has-active{background:var(--ink);color:#fff}
.edit-btn{margin-left:auto;font-size:12px;color:var(--faint);background:none;border:none;cursor:pointer;font-family:inherit}
.edit-btn:hover{color:var(--ink)}

.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tg{
  font-size:12px;font-family:"Pretendard",sans-serif;
  padding:4px 10px;border-radius:6px;
  border:1px solid var(--line);background:#fff;color:var(--muted);
  cursor:pointer;user-select:none;
}
.tg .c{opacity:.55;margin-left:4px;font-size:11px}
.tg.inc{background:var(--ink);border-color:var(--ink);color:#fff}
.tg.exc{background:var(--line);border-color:transparent;color:var(--faint);text-decoration:line-through}

.active-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.af-pill{
  font-size:11px;padding:3px 9px;border-radius:999px;
  display:inline-flex;align-items:center;gap:5px;cursor:pointer;
}
.af-pill.inc{background:var(--ink);color:#fff}
.af-pill.exc{background:var(--line);color:var(--muted);text-decoration:line-through}
.af-x{opacity:.6;font-size:10px}
.filter-footer{display:flex;justify-content:flex-end;margin:2px 0 14px}

/* ── 편집기 ── */
.editor-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:16px}
.editor-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.editor-hdr h2{font-size:13px;font-weight:700;margin:0}
.gh-row{display:flex;gap:8px;margin-bottom:4px}
.gh-row input{flex:1;font-size:13px;padding:7px 10px}
.gh-note{font-size:11px;color:var(--faint);margin-bottom:12px}
.add-group-btn{margin-bottom:14px}

.ed-group{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;overflow:hidden}
.ed-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--line)}
.ed-group-name{
  font-size:13px;font-weight:600;flex:1;border:none;background:transparent;
  color:var(--ink);outline:none;padding:2px 0;font-family:"Pretendard",sans-serif;
  border-bottom:1px solid transparent;
}
.ed-group-name:focus{border-bottom-color:var(--ink)}
.ed-tags{padding:10px 12px;display:flex;gap:6px;flex-wrap:wrap;min-height:42px}
.ed-tag{
  font-size:12px;padding:3px 8px 3px 10px;border-radius:5px;
  border:1px solid var(--line);background:#fff;color:var(--muted);
  display:inline-flex;align-items:center;gap:5px;
}
.ed-rm{font-size:14px;cursor:pointer;color:var(--faint);background:none;border:none;padding:0;line-height:1}
.ed-rm:hover{color:var(--ink)}
.ed-empty{font-size:12px;color:var(--faint)}

/* 미분류 멀티셀렉트 */
.unassigned-section{margin-top:12px}
.unassigned-hdr{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--faint);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--line);
}
.un-chips{display:flex;gap:6px;flex-wrap:wrap}
.un-action{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:10px;padding-top:10px;border-top:1px solid var(--line);
}
.un-action-label{font-size:12px;color:var(--muted);white-space:nowrap}
.un-sel{width:160px;font-size:12px;padding:6px 8px}

.save-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--line)}
.save-msg{font-size:12px;flex:1}
.save-msg.ok{color:#1E7A4B}
.save-msg.err{color:#B94040}

/* ── 카드 ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:500px){.grid{grid-template-columns:1fr}}

.item{border:1px solid var(--line);border-radius:var(--r);background:var(--card);overflow:hidden;display:flex;flex-direction:column}
.thumb{background:#EBEBEB;overflow:hidden}
.thumb img{display:block;width:100%;height:auto}
.thumb.empty{height:48px;display:flex;align-items:center;justify-content:center}
.thumb.empty::after{content:"—";color:var(--line2);font-size:16px}
.card-body{padding:11px 12px;display:flex;flex-direction:column;gap:7px;flex:1}
.card-name{font-size:13px;font-weight:600;line-height:1.4;word-break:break-word}
.card-note{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word;line-height:1.55}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--muted);border:1px solid var(--line)}
.card-open{display:flex;justify-content:flex-end;padding:4px 10px 10px;margin-top:auto}
.card-open a{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;
  border:1px solid var(--line);color:var(--faint);text-decoration:none;
}
.card-open a:hover{border-color:var(--ink);color:var(--ink)}

.empty-msg{color:var(--faint);font-size:13px;text-align:center;padding:40px;grid-column:1/-1}
#moreBtn{display:block;margin:14px auto}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>516 viewer</h1>
    <button class="lock-btn" id="lockBtn" title="토큰 설정">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2.5" y="7" width="10" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7V5C5 3.34 6.34 2 8 2C9.66 2 11 3.34 11 5V7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </header>

  <div class="panel" id="tokPanel">
    <label>Raindrop 테스트 토큰</label>
    <div class="tok-row">
      <input id="tokInput" type="password" placeholder="토큰 붙여넣기" autocomplete="off" spellcheck="false">
      <button class="primary" id="connectBtn">연결</button>
    </div>
    <div id="connErr"></div>
  </div>

  <div class="coll-wrap hidden" id="collWrap">
    <div class="coll-row" id="collChips"></div>
    <div class="progress hidden" id="prog"><span></span></div>
    <div class="load-msg" id="loadMsg"></div>
  </div>

  <div class="hidden" id="mainPanel">
    <div class="search-row">
      <input id="kw" type="search" placeholder="노트 · 제목 검색" autocomplete="off">
      <span class="count-pill" id="resultCount"></span>
    </div>
    <div class="filter-bar" id="filterBar">
      <button class="edit-btn" id="editBtn">그룹 편집</button>
    </div>
    <div class="tag-row" id="tagRow"></div>
    <div class="active-filters" id="activeFilters"></div>
    <div class="filter-footer">
      <button class="text-btn" id="resetBtn">필터 초기화</button>
    </div>
  </div>

  <div class="editor-wrap hidden" id="editorWrap">
    <div class="editor-hdr">
      <h2>태그 그룹 편집</h2>
      <button class="sm" id="closeEditorBtn">닫기</button>
    </div>
    <div class="gh-row">
      <input id="ghInput" type="password" placeholder="GitHub Personal Access Token (저장에 필요, repo 권한)" autocomplete="off" spellcheck="false">
    </div>
    <div class="gh-note">토큰은 이 브라우저에만 저장. 공개 레포 읽기는 토큰 없이도 됨.</div>
    <button class="sm add-group-btn" id="addGroupBtn">+ 새 그룹</button>
    <div id="edGroups"></div>
    <div id="unassignedSection"></div>
    <div class="save-row">
      <button class="primary" id="saveBtn">GitHub에 저장</button>
      <span class="save-msg" id="saveMsg"></span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <button id="moreBtn" hidden>더 보기</button>
</div>

<script>
const REPO     = "eightftunder/516-viewer";
const CFG_PATH = "tag-groups.json";
const GH_API   = `https://api.github.com/repos/${REPO}/contents/${CFG_PATH}`;
const RD_API   = "https://api.raindrop.io/rest/v1";
const PERPAGE  = 50, PAGE_SIZE = 80;

const _m = {};
const store = {
  get: k => { try{return localStorage.getItem(k)}catch{return _m[k]??null} },
  set: (k,v) => { try{localStorage.setItem(k,v)}catch{_m[k]=v} },
};

let TOKEN    = store.get("rd_token") || "";
let GH_TOKEN = store.get("gh_token") || "";

let ALL=[], filtered=[], shown=0;
let curCollId=null, curCollTitle="";
let tagGroups=[], configSha=null;
let tagState={}, kw="", activeCat=null;
let selectedUnassigned = new Set();
const collCache={}, synCache={}, inflight={};

const $  = s => document.querySelector(s);
const el = (t,c,x) => { const e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e };
const esc = s => String(s??"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const b64enc = s => btoa(unescape(encodeURIComponent(s)));
const b64dec = s => decodeURIComponent(escape(atob(s.replace(/\s/g,""))));

// ── GitHub ──
async function loadConfig() {
  try {
    const hdrs = {Accept:"application/vnd.github.v3+json"};
    if(GH_TOKEN) hdrs.Authorization = "Bearer "+GH_TOKEN;
    const r = await fetch(GH_API, {headers:hdrs});
    if(r.status===404){tagGroups=[];return;}
    if(!r.ok) throw 0;
    const d = await r.json();
    configSha = d.sha;
    tagGroups = JSON.parse(b64dec(d.content));
  } catch { tagGroups=[]; }
}

async function saveConfig() {
  const tok=($("#ghInput").value||"").trim()||GH_TOKEN;
  if(!tok) throw new Error("GitHub 토큰이 필요해");
  GH_TOKEN=tok; store.set("gh_token",GH_TOKEN);
  const body={message:"update tag groups",content:b64enc(JSON.stringify(tagGroups,null,2))};
  if(configSha) body.sha=configSha;
  const r=await fetch(GH_API,{
    method:"PUT",
    headers:{Authorization:"Bearer "+GH_TOKEN,"Content-Type":"application/json",Accept:"application/vnd.github.v3+json"},
    body:JSON.stringify(body)
  });
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.message||"저장 실패");}
  configSha=(await r.json()).content.sha;
}

// ── Raindrop ──
async function rdApi(path) {
  let r;
  try{r=await fetch(RD_API+path,{headers:{Authorization:"Bearer "+TOKEN}});}
  catch{throw new Error("네트워크 오류");}
  if(r.status===401) throw new Error("401 토큰 오류");
  if(r.status===429) throw new Error("429 rate limit");
  if(!r.ok) throw new Error(r.status+" "+r.statusText);
  return r.json();
}

// ── 연결 ──
async function connect() {
  TOKEN=($("#tokInput").value||"").trim();
  if(!TOKEN) return;
  $("#connectBtn").disabled=true;
  $("#connErr").innerHTML="";
  try {
    const root=await rdApi("/collections");
    let kids={items:[]};
    try{kids=await rdApi("/collections/childrens");}catch{}
    store.set("rd_token",TOKEN);
    $("#tokPanel").hidden=true;
    $("#lockBtn").classList.add("on");
    $("#collWrap").classList.remove("hidden");
    await loadConfig();
    renderCollections([...(root.items||[]),...(kids.items||[])]);
  } catch(e) {
    $("#connErr").innerHTML=`<div class="err-msg">${esc(e.message)}</div>`;
  } finally { $("#connectBtn").disabled=false; }
}

function renderCollections(cols) {
  const host=$("#collChips"); host.innerHTML="";
  const seen=new Set();
  [{_id:0,title:"All"},{_id:-1,title:"Unsorted"},...cols].forEach(c=>{
    if(seen.has(c._id)) return; seen.add(c._id);
    const chip=el("button","coll-chip");
    chip.innerHTML=esc(c.title)+(c.count!=null&&c.count!==""?`<span class="coll-count">${c.count}</span>`:"");
    chip.onclick=()=>{
      document.querySelectorAll(".coll-chip").forEach(x=>x.classList.remove("sel"));
      chip.classList.add("sel");
      loadAll(c._id,c.title,false);
    };
    host.appendChild(chip);
  });
}

// ── 로딩 (캐시) ──
async function loadAll(id,title,forceRefresh) {
  const isSwitch=id!==curCollId;
  curCollId=id; curCollTitle=title;
  if(isSwitch||forceRefresh){tagState={};kw="";activeCat=null;const k=$("#kw");if(k)k.value="";}
  $("#editorWrap").classList.add("hidden");

  if(!forceRefresh&&collCache[id]) {
    ALL=collCache[id];
    $("#loadMsg").textContent="";
    buildFilter();
    $("#mainPanel").classList.remove("hidden");
    applyFilter();
    return;
  }

  ALL=[]; filtered=[]; shown=0;
  $("#mainPanel").classList.add("hidden");
  $("#grid").innerHTML="";
  $("#moreBtn").hidden=true;
  $("#prog").classList.remove("hidden");
  $("#prog").firstElementChild.style.width="0";
  $("#loadMsg").textContent=`${title} 불러오는 중…`;

  try {
    let page=0,total=Infinity;
    while(page*PERPAGE<total) {
      const d=await rdApi(`/raindrops/${id}?perpage=${PERPAGE}&page=${page}&sort=-created`);
      total=d.count||0;
      ALL.push(...(d.items||[]));
      $("#prog").firstElementChild.style.width=Math.min(100,ALL.length/Math.max(total,1)*100)+"%";
      $("#loadMsg").textContent=`${ALL.length} / ${total}`;
      if(!d.items||d.items.length<PERPAGE) break;
      page++;
    }
    collCache[id]=ALL;
    $("#prog").classList.add("hidden");
    $("#loadMsg").textContent="";
    buildFilter();
    $("#mainPanel").classList.remove("hidden");
    applyFilter();
  } catch(e) {
    $("#prog").classList.add("hidden");
    $("#loadMsg").textContent="오류: "+e.message;
  }
}

// ── 태그 유틸 ──
function tagCounts() {
  const ct={};
  ALL.forEach(it=>(it.tags||[]).forEach(t=>ct[t]=(ct[t]||0)+1));
  return ct;
}
function getGroups() {
  const ct=tagCounts();
  const assigned=new Set(tagGroups.flatMap(g=>g.tags));
  const others=Object.keys(ct).filter(t=>!assigned.has(t)).sort((a,b)=>ct[b]-ct[a]);
  const groups=tagGroups.map(g=>({name:g.name,tags:g.tags.filter(t=>ct[t])})).filter(g=>g.tags.length);
  if(others.length) groups.push({name:"기타",tags:others});
  return {groups,ct};
}

// ── 필터 UI ──
function buildFilter() {
  const bar=$("#filterBar");
  [...bar.children].forEach(c=>{if(c.id!=="editBtn")c.remove();});
  const {groups}=getGroups();
  groups.forEach(g=>{
    const chip=el("button","cat-chip");
    chip.textContent=g.name;
    if(g.tags.some(t=>tagState[t])) chip.classList.add("has-active");
    if(activeCat===g.name) chip.classList.add("sel");
    chip.onclick=()=>{activeCat=activeCat===g.name?null:g.name;buildFilter();};
    bar.insertBefore(chip,$("#editBtn"));
  });
  renderTagRow();
  renderActiveFilters();
}

function renderTagRow() {
  const host=$("#tagRow"); host.innerHTML="";
  if(!activeCat) return;
  const {groups,ct}=getGroups();
  const g=groups.find(x=>x.name===activeCat);
  if(!g) return;
  g.tags.forEach(t=>{
    const b=el("button","tg");
    b.innerHTML=esc(t)+`<span class="c">${ct[t]||0}</span>`;
    const s=tagState[t];
    if(s==="inc") b.classList.add("inc");
    else if(s==="exc") b.classList.add("exc");
    b.onclick=()=>{
      const s=tagState[t];
      if(!s) tagState[t]="inc";
      else if(s==="inc") tagState[t]="exc";
      else delete tagState[t];
      buildFilter(); applyFilter();
    };
    host.appendChild(b);
  });
}

function renderActiveFilters() {
  const host=$("#activeFilters"); host.innerHTML="";
  Object.entries(tagState).forEach(([t,s])=>{
    const p=el("div","af-pill "+s);
    p.innerHTML=`<span>${esc(t)}</span><span class="af-x">✕</span>`;
    p.onclick=()=>{delete tagState[t];buildFilter();applyFilter();};
    host.appendChild(p);
  });
}

// ── 필터 로직 ──
const noteOf=it=>(it.note&&it.note.trim())||"";
function applyFilter() {
  const inc=Object.keys(tagState).filter(t=>tagState[t]==="inc");
  const exc=Object.keys(tagState).filter(t=>tagState[t]==="exc");
  const q=kw.trim().toLowerCase();
  filtered=ALL.filter(it=>{
    const tags=it.tags||[];
    if(inc.length&&!inc.every(t=>tags.includes(t))) return false;
    if(exc.some(t=>tags.includes(t))) return false;
    if(q){const hay=((it.title||"")+" "+noteOf(it)).toLowerCase();if(!hay.includes(q)) return false;}
    return true;
  });
  $("#resultCount").textContent=`${filtered.length} / ${ALL.length}`;
  shown=0; $("#grid").innerHTML=""; renderMore();
}
function renderMore() {
  const slice=filtered.slice(shown,shown+PAGE_SIZE);
  const grid=$("#grid");
  if(shown===0&&!filtered.length){grid.innerHTML='<div class="empty-msg">조건에 맞는 항목 없음</div>';}
  slice.forEach(it=>grid.appendChild(card(it)));
  shown+=slice.length;
  $("#moreBtn").hidden=shown>=filtered.length;
}

// ── 편집기 ──
function openEditor() {
  if(GH_TOKEN) $("#ghInput").value=GH_TOKEN;
  selectedUnassigned.clear();
  renderGroups();
  renderUnassigned();
  $("#editorWrap").classList.remove("hidden");
}

function renderGroups() {
  const host=$("#edGroups"); host.innerHTML="";
  tagGroups.forEach((g,gi)=>{
    const div=el("div","ed-group");
    const hdr=el("div","ed-group-hdr");
    const ni=el("input","ed-group-name");
    ni.value=g.name; ni.oninput=()=>{tagGroups[gi].name=ni.value;};
    hdr.appendChild(ni);
    const del=el("button","sm danger","삭제");
    del.onclick=()=>{tagGroups.splice(gi,1);renderGroups();renderUnassigned();};
    hdr.appendChild(del);
    div.appendChild(hdr);
    const tags=el("div","ed-tags");
    if(!g.tags.length){tags.appendChild(el("span","ed-empty","(태그 없음)"));}
    else g.tags.forEach((t,ti)=>{
      const tag=el("span","ed-tag");
      tag.appendChild(el("span",null,t));
      const rm=el("button","ed-rm","×");
      rm.onclick=()=>{tagGroups[gi].tags.splice(ti,1);renderGroups();renderUnassigned();};
      tag.appendChild(rm);
      tags.appendChild(tag);
    });
    div.appendChild(tags);
    host.appendChild(div);
  });
}

function renderUnassigned() {
  const ct=tagCounts();
  const assigned=new Set(tagGroups.flatMap(g=>g.tags));
  const unassigned=Object.keys(ct).filter(t=>!assigned.has(t)).sort((a,b)=>ct[b]-ct[a]);
  // clean stale selections
  [...selectedUnassigned].forEach(t=>{if(!unassigned.includes(t))selectedUnassigned.delete(t);});

  const host=$("#unassignedSection"); host.innerHTML="";
  if(!unassigned.length) return;

  host.appendChild(el("div","unassigned-hdr","기타 (미분류)"));

  const chips=el("div","un-chips");
  const actionBar=el("div","un-action hidden");
  const actionLabel=el("span","un-action-label","");

  function updateAction() {
    const n=selectedUnassigned.size;
    actionBar.classList.toggle("hidden",n===0);
    actionLabel.textContent=`${n}개 선택 →`;
  }

  unassigned.forEach(t=>{
    const b=el("button","tg"+(selectedUnassigned.has(t)?" inc":""));
    b.innerHTML=esc(t)+`<span class="c">${ct[t]}</span>`;
    b.onclick=()=>{
      if(selectedUnassigned.has(t)){selectedUnassigned.delete(t);b.className="tg";}
      else{selectedUnassigned.add(t);b.className="tg inc";}
      updateAction();
    };
    chips.appendChild(b);
  });
  host.appendChild(chips);

  // action bar
  const sel=document.createElement("select");
  sel.className="un-sel";
  const opt0=el("option",null,"그룹 선택"); opt0.value=""; sel.appendChild(opt0);
  tagGroups.forEach((g,gi)=>{const o=el("option",null,g.name);o.value=gi;sel.appendChild(o);});

  const moveBtn=el("button","sm primary","이동");
  moveBtn.onclick=()=>{
    const gi=parseInt(sel.value);
    if(isNaN(gi)){sel.focus();return;}
    selectedUnassigned.forEach(t=>tagGroups[gi].tags.push(t));
    selectedUnassigned.clear();
    renderGroups();
    renderUnassigned();
  };
  const cancelBtn=el("button","sm","취소");
  cancelBtn.onclick=()=>{selectedUnassigned.clear();renderUnassigned();};

  actionBar.appendChild(actionLabel);
  actionBar.appendChild(sel);
  actionBar.appendChild(moveBtn);
  actionBar.appendChild(cancelBtn);
  host.appendChild(actionBar);
}

// ── 파싱/Syn ──
function parseTweet(link) {
  const s=String(link||"");
  const idm=s.match(/(?:\/status(?:es)?\/|\/i\/web\/status\/|\/i\/status\/)(\d+)/i);
  if(!idm) return null;
  const id=idm[1];
  const hm=s.match(/(?:twitter|x|vxtwitter|fxtwitter|mobile\.twitter|nitter[^\/]*)\.com\/([^\/\?#]+)\/status/i);
  let handle=null;
  if(hm&&!/^(i|web|intent|home|messages)$/i.test(hm[1])) handle=hm[1].replace(/^@/,"");
  return {id,handle,clean:handle?`https://x.com/${handle}/status/${id}`:`https://x.com/i/status/${id}`};
}
function synToken(id){try{return((Number(id)/1e15)*Math.PI).toString(36).replace(/(0+|\.)/g,"")}catch{return"0"}}
async function fetchSyn(id) {
  if(synCache[id]) return synCache[id];
  if(inflight[id]) return inflight[id];
  inflight[id]=(async()=>{
    try{
      const r=await fetch(`https://cdn.syndication.twimg.com/tweet-result?id=${id}&token=${synToken(id)}&lang=en`);
      if(!r.ok) throw 0;
      const d=await r.json();
      const cover=d?.mediaDetails?.[0]?.media_url_https||d?.photos?.[0]?.url||"";
      const v={name:d?.user?.name||"",handle:d?.user?.screen_name||"",cover};
      synCache[id]=v; return v;
    }catch{synCache[id]={name:"",handle:"",cover:""};return synCache[id];}
    finally{delete inflight[id];}
  })();
  return inflight[id];
}

// ── 카드 ──
const ICON=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11L11 2M11 2H6M11 2V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function card(it) {
  const tw=parseTweet(it.link);
  const c=el("div","item");
  const thumb=el("div","thumb empty");
  const img=el("img"); img.loading="lazy"; img.alt="";
  let coverDone=false,synPromise=null;
  const showEmpty=()=>{thumb.classList.add("empty");if(img.parentNode)img.remove();};
  const setImg=u=>{if(!u){showEmpty();return;}thumb.classList.remove("empty");if(!img.parentNode)thumb.appendChild(img);img.src=u;};
  const ensureSyn=()=>{if(!tw)return Promise.resolve({name:"",handle:"",cover:""});if(!synPromise)synPromise=fetchSyn(tw.id);return synPromise;};
  const rawCover=it.cover||(it.media&&it.media[0]&&it.media[0].link)||"";
  img.onload=()=>{coverDone=true;};
  img.onerror=()=>{if(!coverDone){img.onerror=null;ensureSyn().then(v=>{if(v.cover)setImg(v.cover);else showEmpty();});}};
  if(rawCover) setImg(rawCover);
  c.appendChild(thumb);
  const body=el("div","card-body");
  const nameEl=el("div","card-name",it.title||"(제목 없음)");
  body.appendChild(nameEl);
  const note=noteOf(it);
  if(note) body.appendChild(el("div","card-note",note));
  if(it.tags&&it.tags.length){
    const tr=el("div","card-tags");
    it.tags.forEach(t=>tr.appendChild(el("span","tag",t)));
    body.appendChild(tr);
  }
  c.appendChild(body);
  const openDiv=el("div","card-open");
  const a=el("a"); a.href=tw?tw.clean:it.link; a.target="_blank"; a.rel="noopener"; a.title="원본 열기"; a.innerHTML=ICON;
  openDiv.appendChild(a); c.appendChild(openDiv);
  const handleOnly=tw&&!/\(/.test(it.title||"");
  if(tw&&(!rawCover||!tw.handle||handleOnly)){
    ensureSyn().then(v=>{
      if(!coverDone&&!rawCover&&v.cover) setImg(v.cover);
      const handle=tw.handle||v.handle||"";
      if(handle) a.href=`https://x.com/${handle}/status/${tw.id}`;
      if(handleOnly&&v.name) nameEl.textContent=`${v.name} (${handle})`;
    });
  }
  return c;
}

};
$("#moreBtn").onclick=renderMore;

if(TOKEN){$("#tokInput").value=TOKEN;connect();}
if(GH_TOKEN) $("#ghInput").value=GH_TOKEN;
