<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>516 viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#F5F5F3;--card:#FFF;--ink:#141414;
  --muted:#5A5A5A;--faint:#909090;
  --line:#E2E2E2;--line2:#C8C8C8;
  --chip:#FFF;--hover:#ECECE9;--thumb-bg:#EBEBEB;
  --tag-bg:#EDEDEA;--tag-fg:#444;
  --sel-bg:#141414;--sel-fg:#FFF;
  --r:9px;--gap:16px;--pad:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#161618;--card:#1E1E21;--ink:#EAEAEA;
    --muted:#A6A6A6;--faint:#6E6E72;
    --line:#2D2D31;--line2:#3A3A40;
    --chip:#232327;--hover:#2A2A2F;--thumb-bg:#26262A;
    --tag-bg:#2A2A2F;--tag-fg:#C9C9C9;
    --sel-bg:#EAEAEA;--sel-fg:#141414;
  }
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14px;line-height:1.6;
  padding:max(16px,env(safe-area-inset-top)) 16px 60px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:920px;margin:0 auto}
.hidden{display:none!important}

/* ── 헤더 ── */
.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 0 var(--pad);border-bottom:1px solid var(--line);margin-bottom:var(--gap);
}
.top h1{font-family:"Outfit",sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0}
.top-icons{display:flex;align-items:center;gap:3px}
.icon-btn{
  background:none;border:none;cursor:pointer;padding:7px;border-radius:7px;
  color:var(--muted);display:flex;align-items:center;
}
.icon-btn:hover{color:var(--ink);background:var(--hover)}

/* ── 토큰 패널 ── */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);margin-bottom:var(--gap)}
.panel label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}
.tok-row{display:flex;gap:8px}
.tok-row input{flex:1}
.err-msg{font-size:12px;color:#B94040;margin-top:8px}

/* ── 공용 ── */
input,select{
  font-family:"Pretendard",sans-serif;font-size:14px;
  padding:9px 11px;border:1px solid var(--line);border-radius:var(--r);
  background:var(--chip);color:var(--ink);width:100%;outline:none;
}
input:focus,select:focus{border-color:var(--ink)}
button{
  font-family:"Pretendard",sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;padding:9px 14px;border-radius:var(--r);
  border:1px solid var(--line);background:var(--chip);color:var(--ink);white-space:nowrap;
}
button.primary{background:var(--sel-bg);border-color:var(--sel-bg);color:var(--sel-fg)}
button.sm{padding:5px 11px;font-size:12px}
button:disabled{opacity:.4;cursor:default}

/* ── 컬렉션 ── */
.coll-wrap{margin-bottom:var(--gap)}
.coll-row{display:flex;gap:7px;flex-wrap:wrap}
.coll-chip{
  font-size:13px;font-family:"Pretendard",sans-serif;font-weight:500;
  padding:6px 13px;border-radius:999px;
  border:1px solid var(--line);background:var(--chip);color:var(--muted);cursor:pointer;
}
.coll-chip.sel{background:var(--sel-bg);border-color:var(--sel-bg);color:var(--sel-fg)}
.coll-count{opacity:.5;margin-left:4px;font-size:11px}
.progress{height:2px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:14px}
.progress>span{display:block;height:100%;background:var(--ink);width:0;transition:width .2s}
.load-msg{font-size:12px;color:var(--faint);min-height:1.2em;margin-top:7px}

/* ── 검색 ── */
.search-row{
  display:flex;gap:10px;align-items:center;
  padding-bottom:var(--pad);border-bottom:1px solid var(--line);margin-bottom:var(--gap);
}
.search-row input{flex:1}
.count-pill{font-size:12px;color:var(--faint);white-space:nowrap;flex-shrink:0}

/* ── 필터 2단 ── */
.filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.cat-chip{
  font-size:12px;font-family:"Pretendard",sans-serif;font-weight:600;
  padding:5px 13px;border-radius:999px;
  border:1px solid var(--line2);background:var(--chip);color:var(--muted);cursor:pointer;
}
.cat-chip.sel{background:var(--sel-bg);border-color:var(--sel-bg);color:var(--sel-fg)}
.cat-chip.has-active{border-color:var(--ink);color:var(--ink)}
.cat-chip.sel.has-active{background:var(--sel-bg);color:var(--sel-fg)}
.cat-chip .coll-count{opacity:.5}

.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tg{
  font-size:12px;font-family:"Pretendard",sans-serif;
  padding:4px 10px;border-radius:6px;
  border:1px solid var(--line);background:var(--chip);color:var(--muted);
  cursor:pointer;user-select:none;
}
.tg .c{opacity:.55;margin-left:4px;font-size:11px}
.tg.inc{background:var(--sel-bg);border-color:var(--sel-bg);color:var(--sel-fg)}
.tg.exc{background:var(--line);border-color:transparent;color:var(--faint);text-decoration:line-through}

.active-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:var(--gap)}
.af-pill{font-size:11px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
.af-pill.inc{background:var(--sel-bg);color:var(--sel-fg)}
.af-pill.exc{background:var(--line);color:var(--muted);text-decoration:line-through}
.af-x{opacity:.6;font-size:10px}

/* ── 편집기 ── */
.editor-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:var(--pad);margin-bottom:var(--gap)}
.editor-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.editor-hdr h2{font-size:13px;font-weight:700;margin:0}
.ed-cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.ed-sub{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--faint);margin:14px 0 8px}
.ed-tags2{display:flex;gap:6px;flex-wrap:wrap}
.ed-tag{
  font-size:12px;padding:3px 7px 3px 11px;border-radius:6px;
  border:1px solid var(--line);background:var(--chip);color:var(--muted);
  display:inline-flex;align-items:center;gap:6px;
}
.ed-rm{font-size:15px;cursor:pointer;color:var(--faint);background:none;border:none;padding:0;line-height:1}
.ed-rm:hover{color:var(--ink)}
.ed-empty{font-size:12px;color:var(--faint)}
.ed-addbar{margin-top:12px}
.gh-row{margin-top:16px}
.gh-row input{font-size:13px;padding:8px 10px}
.save-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.save-msg{font-size:12px;flex:1}
.save-msg.ok{color:#1E7A4B}.save-msg.err{color:#B94040}

/* 제목 일괄 정리 */
.tools-sec{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.tools-desc{font-size:12px;color:var(--faint);margin-bottom:10px;line-height:1.5}
.fix-msg{font-size:13px;margin:10px 0 6px}
.fix-sample{font-size:12px;color:var(--muted);margin-bottom:8px;word-break:break-all}
.fix-warn{font-size:12px;color:#B96512;background:var(--tag-bg);padding:9px 11px;border-radius:8px;margin:10px 0;line-height:1.5}
.fix-pairs{margin:8px 0}
.fix-pair{font-size:12px;color:var(--muted);margin:3px 0;word-break:break-all}
.fix-pair b{color:var(--ink);font-weight:600}
.fix-progress{display:flex;align-items:center;gap:10px;margin:10px 0;flex-wrap:wrap}
.fix-bar{flex:1;height:4px;background:var(--line);border-radius:3px;overflow:hidden;min-width:120px}
.fix-bar>span{display:block;height:100%;background:var(--ink);width:0;transition:width .2s}
.fix-stat{font-size:12px;color:var(--muted);white-space:nowrap}
.fix-log{max-height:150px;overflow:auto;margin-top:8px;font-size:11px;font-family:ui-monospace,Menlo,monospace}
.fix-line{padding:1px 0}
.fix-line.ok{color:var(--ink)}.fix-line.err{color:#B94040}.fix-line.skip{color:var(--faint)}

/* ── 카드 ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:14px;align-items:stretch;
}
.item{border:1px solid var(--line);border-radius:var(--r);background:var(--card);overflow:hidden;display:flex;flex-direction:column}
.thumb{background:var(--thumb-bg);overflow:hidden}
.thumb.has-img{aspect-ratio:16/10}
.thumb.has-img img{width:100%;height:100%;object-fit:cover;display:block}
.thumb.empty{height:44px;display:flex;align-items:center;justify-content:center}
.thumb.empty::after{content:"—";color:var(--line2);font-size:15px}
.card-body{padding:12px 13px;display:flex;flex-direction:column;gap:8px;flex:1}
.card-name{font-size:15px;font-weight:700;line-height:1.4;word-break:break-word}
.card-note{font-size:13px;color:var(--muted);white-space:pre-wrap;word-break:break-word;line-height:1.55}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:12px;padding:4px 11px;border-radius:999px;background:var(--tag-bg);color:var(--tag-fg);cursor:pointer}
.tag:hover{background:var(--line2)}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 11px 11px;margin-top:auto}
.card-date{font-size:11px;color:var(--faint)}
.card-foot a{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;flex-shrink:0;
  border:1px solid var(--line);color:var(--faint);text-decoration:none;
}
.card-foot a:hover{border-color:var(--ink);color:var(--ink)}

.empty-msg{color:var(--faint);font-size:13px;text-align:center;padding:40px;grid-column:1/-1}

/* 카드 수정 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100}
.modal{background:var(--card);border:1px solid var(--line);border-radius:14px;width:100%;max-width:380px;max-height:90vh;overflow:auto}
.modal-thumb{height:120px;background:var(--thumb-bg) center/cover no-repeat}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:13px}
.modal-body label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.modal-body textarea{width:100%;min-height:58px;resize:vertical;font-family:"Pretendard",sans-serif;font-size:14px;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--chip);color:var(--ink);outline:none}
.modal-body textarea:focus,.modal-body input:focus,.modal-body select:focus{border-color:var(--ink)}
.tag-edit{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag-chip{font-size:12px;padding:5px 6px 5px 11px;border-radius:999px;background:var(--sel-bg);color:var(--sel-fg);display:inline-flex;align-items:center;gap:5px}
.tag-chip button{background:none;border:none;color:inherit;cursor:pointer;padding:0;font-size:14px;line-height:1}
.tag-input-wrap{position:relative;flex:1;min-width:90px}
.tag-input-wrap input{width:100%;height:30px;padding:4px 11px;font-size:13px}
.tag-suggest{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--line2);border-radius:8px;margin-top:4px;max-height:160px;overflow:auto;z-index:10}
.tag-suggest div{padding:8px 11px;font-size:13px;cursor:pointer}
.tag-suggest div.active,.tag-suggest div:hover{background:var(--hover)}
.modal-actions{display:flex;justify-content:space-between;align-items:center;gap:8px;padding-top:2px}
.modal-actions .right{display:flex;gap:8px}
.btn-danger{border-color:#C44;color:#C44}
.btn-danger:hover{background:#C44;color:#fff;border-color:#C44}
.modal-msg{font-size:12px;min-height:1em;text-align:right}
.modal-msg.err{color:#B94040}
.card-edit{background:none;border:none;cursor:pointer;color:var(--faint);padding:4px;display:inline-flex;border-radius:6px}
.card-edit:hover{color:var(--ink);background:var(--hover)}
#moreBtn:not([hidden]){display:block;margin:16px auto}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>516 viewer</h1>
    <div class="top-icons">
      <button class="icon-btn hidden" id="resetBtn" title="필터 초기화">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M6 6L10 10M10 6L6 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn hidden" id="editBtn" title="태그 그룹 편집">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="3" y1="5" x2="13" y2="5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="6" cy="5" r="1.8" fill="var(--card)" stroke="currentColor" stroke-width="1.3"/><line x1="3" y1="11" x2="13" y2="11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="10" cy="11" r="1.8" fill="var(--card)" stroke="currentColor" stroke-width="1.3"/></svg>
      </button>
      <button class="icon-btn" id="lockBtn" title="토큰 설정">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2.7" y="7.3" width="10.6" height="6.7" rx="1.6" stroke="currentColor" stroke-width="1.3"/><path d="M5.2 7.3V5.2C5.2 3.7 6.5 2.3 8 2.3C9.5 2.3 10.8 3.7 10.8 5.2V7.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <div class="panel" id="tokPanel">
    <label>Raindrop 테스트 토큰</label>
    <div class="tok-row">
      <input id="tokInput" type="password" placeholder="토큰 붙여넣기" autocomplete="off" spellcheck="false">
      <button class="primary" id="connectBtn">연결</button>
    </div>
    <div id="connErr"></div>
  </div>

  <div class="coll-wrap hidden" id="collWrap">
    <div class="coll-row" id="collChips"></div>
    <div class="progress hidden" id="prog"><span></span></div>
    <div class="load-msg" id="loadMsg"></div>
  </div>

  <div class="hidden" id="mainPanel">
    <div class="search-row">
      <input id="kw" type="search" placeholder="노트 · 제목 검색" autocomplete="off">
      <span class="count-pill" id="resultCount"></span>
    </div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="tag-row" id="tagRow"></div>
    <div class="active-filters" id="activeFilters"></div>
  </div>

  <div class="editor-wrap hidden" id="editorWrap">
    <div class="editor-hdr">
      <h2 id="edTitle">태그 그룹</h2>
      <button class="sm" id="closeEditorBtn">닫기</button>
    </div>
    <div class="ed-cats" id="edCats"></div>
    <div id="edPanel"></div>
    <div class="gh-row" id="ghRow">
      <input id="ghInput" type="password" placeholder="GitHub PAT (저장에 필요, repo 권한)" autocomplete="off" spellcheck="false">
    </div>
    <div class="save-row">
      <button class="primary sm" id="saveBtn">GitHub에 저장</button>
      <span class="save-msg" id="saveMsg"></span>
    </div>

    <div class="tools-sec">
      <div class="ed-sub">제목 일괄 정리</div>
      <button class="sm" id="fixTitlesBtn">대상 찾기</button>
      <div id="fixPreview"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <button id="moreBtn" hidden>더 보기</button>
</div>

<script>
// ── 설정 ──
const REPO     = "eightftunder/516-viewer";
const CFG_PATH = "tag-groups.json";
const GH_API   = `https://api.github.com/repos/${REPO}/contents/${CFG_PATH}`;
const RD_API   = "https://api.raindrop.io/rest/v1";
const PERPAGE  = 50, PAGE_SIZE = 80;

// 고정 대분류
const CATEGORIES = ["필모", "화보 + 광고", "행사 + 이벤트", "방송 + 유튜브", "나머지"];

// 컬렉션 표시 순서 (목록에 없는 건 뒤에 원래 순서대로)
const COLL_ORDER = ["🔗 516 archive", "🔗 연성", "📎 wip"];

// syndication CORS 우회 프록시 (github.io 등에선 직접 호출이 막혀서 필요).
// 모든 기기에서 작동하도록 코드에 박아둠. Worker 주소 바뀌면 여기만 수정.
const SYN_PROXY = "https://516-viewer.8290570.workers.dev";

// ── 저장소 ──
const _m = {};
const store = {
  get: k => { try{return localStorage.getItem(k)}catch{return _m[k]??null} },
  set: (k,v) => { try{localStorage.setItem(k,v)}catch{_m[k]=v} },
};

let TOKEN    = store.get("rd_token") || "";
let GH_TOKEN = store.get("gh_token") || "";

let ALL=[], filtered=[], shown=0;
let curCollId=null, curCollTitle="";
let tagGroups={}, configSha=null;
let tagState={}, kw="", activeCat=null;
let edCat=null; const edSel=new Set();
let COLLECTIONS=[], modalItem=null, modalTags=[];
const collCache={}, synCache={}, inflight={};

const $  = s => document.querySelector(s);
const el = (t,c,x) => { const e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e };
const esc = s => String(s??"").replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const b64enc = s => btoa(unescape(encodeURIComponent(s)));
const b64dec = s => decodeURIComponent(escape(atob(s.replace(/\s/g,""))));

function defaultCfg(){ const o={"🔗 516 archive":{}}; CATEGORIES.forEach(c=>o["🔗 516 archive"][c]=[]); return o; }

// ── GitHub config ──
async function loadConfig() {
  tagGroups = defaultCfg();
  try {
    const hdrs={Accept:"application/vnd.github.v3+json"};
    if(GH_TOKEN) hdrs.Authorization="Bearer "+GH_TOKEN;
    const r=await fetch(GH_API,{headers:hdrs});
    if(r.status===404) return;
    if(!r.ok) throw 0;
    const d=await r.json();
    configSha=d.sha;
    const parsed=JSON.parse(b64dec(d.content));
    const vals=Object.values(parsed);
    if(vals.length && vals.every(v=>Array.isArray(v))){
      // 옛 평면 구조 {대분류:[태그]} → 516 archive 아래로 이동
      tagGroups={"🔗 516 archive":parsed};
    }else{
      tagGroups=parsed; // 이미 컬렉션별 중첩
    }
  } catch {}
}
async function saveConfig() {
  const tok=($("#ghInput").value||"").trim()||GH_TOKEN;
  if(!tok) throw new Error("GitHub 토큰이 필요해");
  GH_TOKEN=tok; store.set("gh_token",GH_TOKEN);
  const body={message:"update tag groups",content:b64enc(JSON.stringify(tagGroups,null,2))};
  if(configSha) body.sha=configSha;
  const r=await fetch(GH_API,{
    method:"PUT",
    headers:{Authorization:"Bearer "+GH_TOKEN,"Content-Type":"application/json",Accept:"application/vnd.github.v3+json"},
    body:JSON.stringify(body)
  });
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.message||"저장 실패");}
  configSha=(await r.json()).content.sha;
}

// ── Raindrop ──
async function rdApi(path) {
  let r;
  try{r=await fetch(RD_API+path,{headers:{Authorization:"Bearer "+TOKEN}});}
  catch{throw new Error("네트워크 오류");}
  if(r.status===401) throw new Error("401 토큰 오류");
  if(r.status===429) throw new Error("429 rate limit");
  if(!r.ok) throw new Error(r.status+" "+r.statusText);
  return r.json();
}

async function connect() {
  TOKEN=($("#tokInput").value||"").trim();
  if(!TOKEN) return;
  $("#connectBtn").disabled=true; $("#connErr").innerHTML="";
  try {
    const root=await rdApi("/collections");
    let kids={items:[]};
    try{kids=await rdApi("/collections/childrens");}catch{}
    store.set("rd_token",TOKEN);
    $("#tokPanel").hidden=true;
    $("#collWrap").classList.remove("hidden");
    await loadConfig();
    renderCollections([...(root.items||[]),...(kids.items||[])]);
  } catch(e) {
    $("#connErr").innerHTML=`<div class="err-msg">${esc(e.message)}</div>`;
  } finally { $("#connectBtn").disabled=false; }
}

function renderCollections(cols) {
  const host=$("#collChips"); host.innerHTML="";
  const seen=new Set();
  const ordered=[...cols].sort((a,b)=>{
    const ia=COLL_ORDER.indexOf(a.title), ib=COLL_ORDER.indexOf(b.title);
    return (ia===-1?999:ia)-(ib===-1?999:ib);
  });
  const seenColl=new Set();
  COLLECTIONS = ordered.filter(c=>{ if(seenColl.has(c._id))return false; seenColl.add(c._id); return true; })
                       .map(c=>({id:c._id,title:c.title}));  // 모달 컬렉션 이동용 (중복 제거)
  [{_id:0,title:"All"},{_id:-1,title:"Unsorted"},...ordered].forEach(c=>{
    if(seen.has(c._id)) return; seen.add(c._id);
    const chip=el("button","coll-chip");
    chip.innerHTML=esc(c.title)+(c.count!=null&&c.count!==""?`<span class="coll-count">${c.count}</span>`:"");
    chip.onclick=()=>{
      document.querySelectorAll(".coll-chip").forEach(x=>x.classList.remove("sel"));

      loadAll(c._id,c.title,false);

  });
}

// ── 로딩 (캐시) ──
async function loadAll(id,title,forceRefresh) {
  const isSwitch=id!==curCollId;
  curCollId=id; curCollTitle=title;
  if(isSwitch||forceRefresh){tagState={};kw="";activeCat=null;const k=$("#kw");if(k)k.value="";}
  $("#editorWrap").classList.add("hidden");

  if(!forceRefresh&&collCache[id]) {
    ALL=collCache[id]; $("#loadMsg").textContent="";
    afterLoad(); return;
  }
  ALL=[];filtered=[];shown=0;
  $("#mainPanel").classList.add("hidden");
  $("#grid").innerHTML=""; $("#moreBtn").hidden=true;
  $("#editBtn").classList.add("hidden");
  $("#prog").classList.remove("hidden");
  $("#prog").firstElementChild.style.width="0";
  $("#loadMsg").textContent=`${title} 불러오는 중…`;
  try {
    let page=0,total=Infinity;
    while(page*PERPAGE<total) {
      const d=await rdApi(`/raindrops/${id}?perpage=${PERPAGE}&page=${page}&sort=-created`);
      total=d.count||0; ALL.push(...(d.items||[]));
      $("#prog").firstElementChild.style.width=Math.min(100,ALL.length/Math.max(total,1)*100)+"%";
      $("#loadMsg").textContent=`${ALL.length} / ${total}`;
      if(!d.items||d.items.length<PERPAGE) break;
      page++;
    }
    collCache[id]=ALL;
    $("#prog").classList.add("hidden");
    $("#loadMsg").textContent="";
    afterLoad();
  } catch(e) {
    $("#prog").classList.add("hidden");
    $("#loadMsg").textContent="오류: "+e.message;
  }
}
function afterLoad(){
  buildFilter();
  $("#mainPanel").classList.remove("hidden");
  $("#editBtn").classList.remove("hidden");
  applyFilter();
}

// ── 태그 유틸 ──
function tagCounts(){ const ct={}; ALL.forEach(it=>(it.tags||[]).forEach(t=>ct[t]=(ct[t]||0)+1)); return ct; }

// 현재 컬렉션의 대분류 세트. All/Unsorted는 전체 합쳐서(읽기전용) 반환.
function curCats(){
  if(curCollId===0||curCollId===-1){
    const merged={};
    Object.values(tagGroups).forEach(set=>{
      Object.entries(set||{}).forEach(([cat,tags])=>{ merged[cat]=[...(merged[cat]||[]),...tags]; });
    });
    return merged;
  }
  if(!tagGroups[curCollTitle]) tagGroups[curCollTitle]={};
  return tagGroups[curCollTitle];
}
function isEditableColl(){ return curCollId!==0 && curCollId!==-1; }

function getGroups(){
  const ct=tagCounts();
  const cats=curCats();
  const assigned=new Set(Object.values(cats).flat());
  const groups=Object.keys(cats).map(name=>({name,tags:(cats[name]||[]).filter(t=>ct[t])})).filter(g=>g.tags.length);
  const unassigned=Object.keys(ct).filter(t=>!assigned.has(t)).sort((a,b)=>ct[b]-ct[a]);
  if(unassigned.length) groups.push({name:"미분류",tags:unassigned});
  return {groups,ct};
}

// ── 필터 UI ──
function buildFilter() {
  const bar=$("#filterBar"); bar.innerHTML="";
  const {groups}=getGroups();
  groups.forEach(g=>{
    const chip=el("button","cat-chip");
    chip.textContent=g.name;
    if(g.tags.some(t=>tagState[t])) chip.classList.add("has-active");
    if(activeCat===g.name) chip.classList.add("sel");
    chip.onclick=()=>{activeCat=activeCat===g.name?null:g.name;buildFilter();};
    bar.appendChild(chip);
  });
  renderTagRow();
  renderActiveFilters();
  updateChrome();
}
function renderTagRow() {
  const host=$("#tagRow"); host.innerHTML="";
  if(!activeCat) return;
  const {groups,ct}=getGroups();
  const g=groups.find(x=>x.name===activeCat); if(!g) return;
  g.tags.forEach(t=>{
    const b=el("button","tg");
    b.innerHTML=esc(t)+`<span class="c">${ct[t]||0}</span>`;
    const s=tagState[t];
    if(s==="inc") b.classList.add("inc"); else if(s==="exc") b.classList.add("exc");
    b.onclick=()=>{

function renderActiveFilters() {
  const host=$("#activeFilters"); host.innerHTML="";
  Object.entries(tagState).forEach(([t,s])=>{
    const p=el("div","af-pill "+s);

    p.onclick=()=>{delete tagState[t];buildFilter();applyFilter();};
    host.appendChild(p);
  });
}
function updateChrome(){
  const active=Object.keys(tagState).length>0||!!kw.trim();
  $("#resetBtn").classList.toggle("hidden",!active);
}
// 카드 태그 클릭 → 그 태그 단독 필터
function focusTag(t){
  tagState={}; tagState[t]="inc";
  kw=""; const k=$("#kw"); if(k)k.value="";
  const {groups}=getGroups();
  const g=groups.find(g=>g.tags.includes(t));
  activeCat=g?g.name:null;
  buildFilter(); applyFilter();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ── 필터 로직 ──
const noteOf=it=>(it.note&&it.note.trim())||"";
function applyFilter() {
  const inc=Object.keys(tagState).filter(t=>tagState[t]==="inc");
  const exc=Object.keys(tagState).filter(t=>tagState[t]==="exc");
  const q=kw.trim().toLowerCase();
  filtered=ALL.filter(it=>{
    const tags=it.tags||[];
    if(inc.length&&!inc.every(t=>tags.includes(t))) return false;
    if(exc.some(t=>tags.includes(t))) return false;
    if(q){const hay=((it.title||"")+" "+noteOf(it)).toLowerCase();if(!hay.includes(q)) return false;}
    return true;
  });
  $("#resultCount").textContent=`${filtered.length} / ${ALL.length}`;
  shown=0; $("#grid").innerHTML=""; renderMore();
  updateChrome();
}
function renderMore() {
  const slice=filtered.slice(shown,shown+PAGE_SIZE);
  const grid=$("#grid");
  if(shown===0&&!filtered.length){grid.innerHTML='<div class="empty-msg">조건에 맞는 항목 없음</div>';}
  slice.forEach(it=>grid.appendChild(card(it)));
  shown+=slice.length;
  $("#moreBtn").hidden=shown>=filtered.length;
}

// ── 파싱/Syn ──
function parseTweet(link) {
  const s=String(link||"");
  const idm=s.match(/(?:\/status(?:es)?\/|\/i\/web\/status\/|\/i\/status\/)(\d+)/i);
  if(!idm) return null;
  const id=idm[1];
  const hm=s.match(/(?:twitter|x|vxtwitter|fxtwitter|mobile\.twitter|nitter[^\/]*)\.com\/([^\/\?#]+)\/status/i);
  let handle=null;
  if(hm&&!/^(i|web|intent|home|messages)$/i.test(hm[1])) handle=hm[1].replace(/^@/,"");
  return {id,handle,clean:handle?`https://x.com/${handle}/status/${id}`:`https://x.com/i/status/${id}`};
}
function synToken(id){try{return((Number(id)/1e15)*Math.PI).toString(36).replace(/(0+|\.)/g,"")}catch{return"0"}}
// 트윗 ID(snowflake) → UTC 타임스탬프 → 기기 시간대 날짜 (29 Jun 2026)
function postDate(id){
  try{
    const ms=Number((BigInt(id)>>22n)+1288834974657n);
    return new Date(ms).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  }catch{return"";}
}
function synUrl(id){ return SYN_PROXY ? `${SYN_PROXY}?id=${id}` : `https://cdn.syndication.twimg.com/tweet-result?id=${id}&token=${synToken(id)}&lang=en`; }
async function fetchSyn(id) {
  if(synCache[id]) return synCache[id];
  if(inflight[id]) return inflight[id];
  inflight[id]=(async()=>{
    try{
      const r=await fetch(synUrl(id));
      if(!r.ok) throw 0;
      const d=await r.json();
      const cover=d?.mediaDetails?.[0]?.media_url_https||d?.photos?.[0]?.url||"";
      const v={name:d?.user?.name||"",handle:d?.user?.screen_name||"",cover};
      synCache[id]=v; return v;
    }catch{synCache[id]={name:"",handle:"",cover:""};return synCache[id];}
    finally{delete inflight[id];}
  })();
  return inflight[id];
}

// ── 카드 ──
const ICON=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11L11 2M11 2H6M11 2V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function card(it) {
  const tw=parseTweet(it.link);
  const c=el("div","item");
  const thumb=el("div","thumb empty");
  const img=el("img"); img.loading="lazy"; img.alt="";
  let coverDone=false,synPromise=null;
  const showEmpty=()=>{thumb.className="thumb empty";if(img.parentNode)img.remove();};
  const setImg=u=>{if(!u){showEmpty();return;}thumb.className="thumb has-img";if(!img.parentNode)thumb.appendChild(img);img.src=u;};
  const ensureSyn=()=>{if(!tw)return Promise.resolve({name:"",handle:"",cover:""});if(!synPromise)synPromise=fetchSyn(tw.id);return synPromise;};
  const rawCover=it.cover||(it.media&&it.media[0]&&it.media[0].link)||"";
  img.onload=()=>{coverDone=true;};
  img.onerror=()=>{if(!coverDone){img.onerror=null;ensureSyn().then(v=>{if(v.cover)setImg(v.cover);else showEmpty();});}};
  if(rawCover) setImg(rawCover);
  c.appendChild(thumb);

  const body=el("div","card-body");
  const nameEl=el("div","card-name",it.title||"(제목 없음)");
  body.appendChild(nameEl);
  const note=noteOf(it);
  if(note) body.appendChild(el("div","card-note",note));
  if(it.tags&&it.tags.length){
    const tr=el("div","card-tags");
    it.tags.forEach(t=>{
      const tEl=el("span","tag",t);
      tEl.onclick=()=>focusTag(t);
      tr.appendChild(tEl);
    });
    body.appendChild(tr);
  }
  c.appendChild(body);

  const foot=el("div","card-foot");
  const dateStr=tw?postDate(tw.id):"";
  foot.appendChild(el("span","card-date",dateStr));
  const footRight=el("div"); footRight.style.cssText="display:flex;align-items:center;gap:6px";
  const editBtn=el("button","card-edit"); editBtn.title="수정"; editBtn.setAttribute("aria-label","수정");
  editBtn.innerHTML=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L5 11l-2.5.5L3 9l6.5-6.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
  editBtn.onclick=()=>openModal(it);
  footRight.appendChild(editBtn);
  const a=el("a"); a.href=tw?tw.clean:it.link; a.target="_blank"; a.rel="noopener"; a.title="원본 열기"; a.innerHTML=ICON;
  footRight.appendChild(a);
  foot.appendChild(footRight); c.appendChild(foot);

  const handleOnly=tw&&!/\(/.test(it.title||"");
  if(tw&&(!rawCover||!tw.handle||handleOnly)){
    ensureSyn().then(v=>{
      if(!coverDone&&!rawCover&&v.cover) setImg(v.cover);
      const handle=tw.handle||v.handle||"";
      if(handle) a.href=`https://x.com/${handle}/status/${tw.id}`;
      if(handleOnly&&v.name) nameEl.textContent=`${v.name} (@${handle})`;
    });
  }
  return c;
}

let M=null;
function buildModal(){

  const ov=el("div","modal-overlay"); ov.hidden=true;

    <div class="modal" role="dialog" aria-modal="true">

        <div><label>노트</label><textarea id="mNote"></textarea></div>
        <div><label>태그</label><div class="tag-edit" id="mTagEdit"></div></div>
        <div><label>컬렉션</label><select id="mColl"></select></div>
        <div class="modal-actions">
          <button class="btn-danger" id="mDelete">삭제</button>
          <div class="right">
            <button id="mCancel">취소</button>
            <button class="primary" id="mSave">저장</button>
          </div>
        </div>
        <div class="modal-msg" id="mMsg"></div>
      </div>
    </div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click",e=>{ if(e.target===ov) closeModal(); });
  M={ov,thumb:ov.querySelector("#mThumb"),title:ov.querySelector("#mTitle"),note:ov.querySelector("#mNote"),
     tagEdit:ov.querySelector("#mTagEdit"),coll:ov.querySelector("#mColl"),msg:ov.querySelector("#mMsg"),
     del:ov.querySelector("#mDelete"),cancel:ov.querySelector("#mCancel"),save:ov.querySelector("#mSave")};
  M.cancel.onclick=closeModal;
  M.save.onclick=saveModal;
  M.del.onclick=deleteModal;
  return M;
}

function openModal(it){
  buildModal();
  modalItem=it;
  modalTags=[...(it.tags||[])];
  M.title.value=it.title||"";
  M.note.value=noteOf(it);
  // 컬렉션 드롭다운
  const cur=it.collectionId||(it.collection&&it.collection.$id);
  M.coll.innerHTML="";
  COLLECTIONS.forEach(c=>{
    const o=el("option",null,c.title); o.value=c.id;
    if(c.id===cur) o.selected=true;
    M.coll.appendChild(o);
  });
  // 썸네일
  const cover=it.cover||(it.media&&it.media[0]&&it.media[0].link)||"";
  M.thumb.style.backgroundImage=cover?`url("${cover.replace(/"/g,"")}")`:"";
  M.thumb.style.display=cover?"block":"none";
  M.msg.textContent="";
  renderModalTags();
  M.ov.hidden=false;
}
function closeModal(){ if(M) M.ov.hidden=true; modalItem=null; }

function renderModalTags(){
  const host=M.tagEdit; host.innerHTML="";
  modalTags.forEach((t,i)=>{
    const chip=el("span","tag-chip");
    chip.appendChild(el("span",null,t));
    const x=el("button",null,"×"); x.onclick=()=>{modalTags.splice(i,1);renderModalTags();};
    chip.appendChild(x); host.appendChild(chip);
  });
  const wrap=el("div","tag-input-wrap");
  const inp=el("input"); inp.type="text"; inp.placeholder="태그 추가"; inp.autocomplete="off";
  const sug=el("div","tag-suggest"); sug.hidden=true;
  wrap.appendChild(inp); wrap.appendChild(sug); host.appendChild(wrap);

  const allTags=Object.keys(tagCounts());
  let active=-1;

  function highlight(){
    [...sug.children].forEach((d,i)=>d.classList.toggle("active",i===active));
    const a=sug.children[active]; if(a) a.scrollIntoView({block:"nearest"});
  }
  function refresh(){
    const q=inp.value.trim().toLowerCase();
    sug.innerHTML=""; active=-1;
    if(!q){ sug.hidden=true; return; }
    const matches=allTags.filter(t=>t.toLowerCase().includes(q)&&!modalTags.includes(t)).slice(0,8);
    if(!matches.length){ sug.hidden=true; return; }
    matches.forEach(t=>{
      const d=el("div",null,t);
      d.onmousedown=e=>{e.preventDefault();addTag(t);};
      sug.appendChild(d);
    });
    sug.hidden=false;
  }
  function addTag(t){
    t=t.trim(); if(t&&!modalTags.includes(t)) modalTags.push(t);
    renderModalTags();
    setTimeout(()=>M.tagEdit.querySelector(".tag-input-wrap input")?.focus(),0);
  }
  inp.oninput=refresh;
  inp.onkeydown=e=>{
    const items=[...sug.children];
    if(e.key==="ArrowDown"){ e.preventDefault(); if(items.length){ active=(active+1)%items.length; highlight(); } }
    else if(e.key==="ArrowUp"){ e.preventDefault(); if(items.length){ active=(active-1+items.length)%items.length; highlight(); } }
    else if(e.key==="Enter"){
      e.preventDefault();
      if(active>=0&&items[active]) addTag(items[active].textContent);
      else if(inp.value.trim()) addTag(inp.value);
    }
    else if(e.key==="Escape"){ if(!sug.hidden){ e.stopPropagation(); sug.hidden=true; } }
    else if(e.key==="Backspace"&&!inp.value&&modalTags.length){ modalTags.pop(); renderModalTags(); setTimeout(()=>M.tagEdit.querySelector(".tag-input-wrap input")?.focus(),0); }
  };
  inp.onblur=()=>setTimeout(()=>{sug.hidden=true;},150);
}

async function saveModal(){
  if(!modalItem) return;
  const it=modalItem;
  M.save.disabled=true; M.msg.className="modal-msg"; M.msg.textContent="저장 중…";

  // ⚠ 바뀐 필드만 보냄 — 안 건드린 건 절대 덮어쓰지 않음
  const body={};
  const newTitle=M.title.value.trim();
  if(newTitle!==(it.title||"")) body.title=newTitle;
  const newNote=M.note.value;
  if(newNote!==(it.note||"")) body.note=newNote;
  const oldTags=it.tags||[];
  const tagsChanged = modalTags.length!==oldTags.length || oldTags.some(t=>!modalTags.includes(t)) || modalTags.some(t=>!oldTags.includes(t));
  if(tagsChanged) body.tags=[...modalTags];
  const newColl=parseInt(M.coll.value);
  const oldColl=it.collectionId||(it.collection&&it.collection.$id);
  const moved=!isNaN(newColl)&&newColl!==oldColl;
  if(moved) body.collection={"$id":newColl};

  if(Object.keys(body).length===0){ closeModal(); return; }  // 변경 없음

  try{
    await rdUpdate(it._id,body);
    if('title' in body) it.title=body.title;
    if('note' in body) it.note=body.note;
    if('tags' in body) it.tags=[...modalTags];
    if(moved){
      it.collectionId=newColl; if(it.collection) it.collection.$id=newColl;
      if(curCollId!==0&&curCollId!==-1&&newColl!==curCollId){ const i=ALL.indexOf(it); if(i>=0) ALL.splice(i,1); }
    }
    collCache[curCollId]=ALL;
    closeModal(); buildFilter(); applyFilter();
  }catch(e){
    M.msg.className="modal-msg err"; M.msg.textContent="저장 실패: "+e.message;
  }finally{ M.save.disabled=false; }
}

async function deleteModal(){
  if(!modalItem) return;
  if(!confirm("이 북마크를 레인드롭에서 삭제할까? 되돌릴 수 없어.")) return;
  const it=modalItem;
  M.del.disabled=true; M.msg.className="modal-msg"; M.msg.textContent="삭제 중…";
  try{
    await rdDelete(it._id);
    const i=ALL.indexOf(it); if(i>=0) ALL.splice(i,1);
    collCache[curCollId]=ALL;
    closeModal(); buildFilter(); applyFilter();
  }catch(e){
    M.msg.className="modal-msg err"; M.msg.textContent="삭제 실패: "+e.message;
  }finally{ M.del.disabled=false; }
}

// ── 제목 일괄 정리 ──
let fixTargets=[], fixCancel=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function titleState(it,tw){
  const t=(it.title||"").trim();
  if(!t) return "empty";
  if(/\s\(@[^)]+\)$/.test(t)) return "ok";        // '닉네임 (@핸들)' 완성형
  if(/\S\(@[^)]+\)$/.test(t)) return "nospace";   // '닉네임(@핸들)' 공백만 없음
  if(t.startsWith("@")) return "handle";
  if(/^https?:\/\//i.test(t)) return "url";
  if(/^(www\.)?(x|twitter|mobile\.twitter)\.com(\/|$)/i.test(t)) return "url";
  if(tw&&tw.handle&&t.toLowerCase()===tw.handle.toLowerCase()) return "handle";
  return "ok";
}

function findFixTargets(){
  fixTargets=[];
  ALL.forEach(it=>{
    const tw=parseTweet(it.link);
    if(!tw) return;
    const st=titleState(it,tw);
    if(st!=="ok") fixTargets.push({it,tw,st});
  });
  return fixTargets;
}

// 대상 1건의 새 제목 계산. nospace는 호출 없음, 나머지는 syndication.
async function computeNewTitle(it,tw,st){
  if(st==="nospace"){
    return (it.title||"").trim().replace(/\s*\(@/," (@");
  }
  const v=await fetchSyn(tw.id);
  const handle=tw.handle||v.handle||"";
  if(v.name&&handle) return `${v.name} (@${handle})`;
  return null;
}

async function previewFix(){
  const host=$("#fixPreview");
  host.innerHTML='<div class="fix-msg">대상 찾는 중…</div>';
  findFixTargets();
  if(!fixTargets.length){ host.innerHTML='<div class="fix-msg">정리할 항목이 없어 (이 컬렉션 기준).</div>'; return; }
  const by={empty:0,url:0,handle:0,nospace:0};
  fixTargets.forEach(t=>by[t.st]++);

  // 샘플 5개 실제 before→after
  const sample=fixTargets.slice(0,5);
  const pairs=await Promise.all(sample.map(async({it,tw,st})=>{
    const nt=await computeNewTitle(it,tw,st);
    return {cur:it.title||"(비어있음)", nt:nt||"(데이터 없음 → 건너뜀)"};
  }));

  host.innerHTML=`
    <div class="fix-msg">대상 <b>${fixTargets.length}</b>개 — 비어있음 ${by.empty} · 링크형 ${by.url} · 핸들만 ${by.handle} · 공백없음 ${by.nospace}</div>
    <div class="fix-pairs">${pairs.map(p=>`<div class="fix-pair">${esc(p.cur)} → <b>${esc(p.nt)}</b></div>`).join("")}</div>
    <div class="fix-warn">⚠ 실행하면 이 ${fixTargets.length}개의 제목을 레인드롭에 실제로 덮어써. 이미 '닉네임 (@핸들)' 형식은 안 건드림. syndication 실패(삭제·보호)는 건너뜀. 1개당 ~0.6초, 약 ${Math.ceil(fixTargets.length*0.6/60)}분.</div>
    <button class="primary" id="runFixBtn">${fixTargets.length}개 제목 수정 실행</button>`;
  $("#runFixBtn").onclick=runFix;
}

async function rdUpdate(id,body){
  const r=await fetch(`${RD_API}/raindrop/${id}`,{
    method:"PUT",
    headers:{Authorization:"Bearer "+TOKEN,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error("PUT "+r.status);
  return r.text().catch(()=>"");   // 본문 비어도 안 멈추게 (json 파싱 안 함)
}
async function rdDelete(id){
  const r=await fetch(`${RD_API}/raindrop/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+TOKEN}
  });
  if(!r.ok) throw new Error("DELETE "+r.status);
  return r.text().catch(()=>"");
}

function logLine(host,text,cls){
  host.prepend(el("div","fix-line "+cls,text));
  while(host.children.length>60) host.lastChild.remove();
}

async function runFix(){
  if(!confirm(`${fixTargets.length}개 제목을 레인드롭에 실제로 수정합니다. 계속할까요?`)) return;
  fixCancel=false;
  const host=$("#fixPreview");
  host.innerHTML=`
    <div class="fix-progress">
      <div class="fix-bar"><span id="fixBar"></span></div>
      <button class="sm" id="stopFixBtn">중단</button>
    </div>
    <div class="fix-stat" id="fixStat">시작…</div>
    <div class="fix-log" id="fixLog"></div>`;
  $("#stopFixBtn").onclick=()=>{fixCancel=true;$("#stopFixBtn").textContent="중단 중…";};
  const log=$("#fixLog");
  let done=0,fixed=0,skipped=0;
  const total=fixTargets.length;

  for(const {it,tw,st} of fixTargets){
    if(fixCancel) break;
    let newTitle=null;
    try{ newTitle=await computeNewTitle(it,tw,st); }catch{}
    if(newTitle && newTitle!==(it.title||"").trim()){
      try{
        await rdUpdate(it._id,{title:newTitle});
        it.title=newTitle;
        fixed++; logLine(log,`✓ ${newTitle}`,"ok");
      }catch(e){ skipped++; logLine(log,`✗ 쓰기실패 (${tw.id})`,"err"); }
      await sleep(600);
    }else{
      skipped++; logLine(log,`– 건너뜀 (${tw.id})`,"skip");
    }
    done++;
    $("#fixBar").style.width=(done/total*100)+"%";
    $("#fixStat").textContent=`${done}/${total} · 수정 ${fixed} · 건너뜀 ${skipped}`;
  }
  $("#fixStat").textContent+=fixCancel?" · 중단됨":" · 완료";
  collCache[curCollId]=ALL;
  buildFilter(); applyFilter();
}

  catch(e){msgEl.className="save-msg err";msgEl.textContent=e.message;}

};

if(TOKEN){$("#tokInput").value=TOKEN;connect();}
